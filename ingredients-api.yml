openapi: 3.1.0
info:
  title: Ingredients API
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:

  /ingredients:
    get:
      summary: Get ingredients with pagination
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'

  /ingredients/{id}:
    get:
      summary: Get ingredient by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ingredient found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
        '404':
          description: Ingredient not found
          content:
            text/plain:
              example: Ingredient.id=1 is not found

  /ingredients/{id}/stock:
    get:
      summary: Get stock value at a given time
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: at
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: unit
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UnitEnum'
      responses:
        '200':
          description: Stock value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValue'
        '400':
          description: Missing parameters
          content:
            text/plain:
              example: Either mandatory query parameter `at` or `unit` is not provided.
        '404':
          description: Ingredient not found
          content:
            text/plain:
              example: Ingredient.id=1 is not found

  /dishes:
    get:
      summary: Get all dishes with ingredients
      responses:
        '200':
          description: List of dishes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'

  /dishes/{id}/ingredients:
    put:
      summary: Update dish ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                example: 1
      responses:
        '204':
          description: Updated successfully
        '400':
          description: Request body is required
          content:
            text/plain:
              example: Request body is required
        '404':
          description: Dish not found
          content:
            text/plain:
              example: Dish.id=1 is not found

components:

  schemas:

    Ingredient:
      type: object
      required:
        - id
        - name
        - price
        - category
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: double
        category:
          $ref: '#/components/schemas/CategoryEnum'

    Dish:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sellingPrice:
          type: number
        dishType:
          $ref: '#/components/schemas/DishTypeEnum'
        dishIngredients:
          type: array
          items:
            $ref: '#/components/schemas/DishIngredient'

    DishIngredient:
      type: object
      properties:
        ingredient:
          $ref: '#/components/schemas/Ingredient'

    StockValue:
      type: object
      properties:
        quantity:
          type: number
        unit:
          $ref: '#/components/schemas/UnitEnum'

    CategoryEnum:
      type: string
      enum:
        - VEGETABLE
        - MEAT
        - DAIRY
        - OTHER

    DishTypeEnum:
      type: string
      enum:
        - STARTER
        - MAIN
        - DESSERT

    UnitEnum:
      type: string
      enum:
        - KG
        - L
        - PCS